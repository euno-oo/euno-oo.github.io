    rel="stylesheet">

  <meta name="description" content="Help Euno recover energy in this wellness mini-game for burnout support and balanced choices.">
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1">
  <meta name="theme-color" content="#6750A4">

</head>

<body>
<div class="app-shell" id="app-root">
    <header class="top-app-bar" role="banner" style="height: 64px; flex-shrink: 0; background-color: var(--surface-low, #F7F2FA); border-bottom: 1px solid var(--outline-variant, #CAC4D0); display: grid; grid-template-columns: 1fr auto 1fr; align-items: center; padding: 0 16px; z-index: 10; gap: 8px;">
      <div style="display: flex; align-items: center; justify-content: flex-start;">
        <a href="../games.html" class="icon-button" aria-label="Back to Games" style="width: 44px; height: 44px; border-radius: 9999px; border: none; background: transparent; color: var(--text-primary, #1C1B1F); cursor: pointer; display: grid; place-items: center; text-decoration: none;">
          <span class="material-icons-round">arrow_back</span>
        </a>
      </div>
      <div style="display: flex; align-items: center; gap: 8px; justify-content: center;">
        <span class="material-symbols-outlined" aria-hidden="true" style="color: var(--primary, #6750A4); font-size: 22px;">pets</span>
        <span style="font-family: var(--font-display, 'Plus Jakarta Sans', sans-serif); font-size: 17px; font-weight: 600; color: var(--text-primary, #1C1B1F); white-space: nowrap;">Vitality Monitor</span>
      </div>
      <div style="display: flex; align-items: center; justify-content: flex-end; gap: 4px;">
        <button id="theme-toggle" class="icon-button" type="button" aria-label="Switch theme" aria-pressed="false" style="width: 44px; height: 44px; border-radius: 9999px; border: none; background: transparent; color: var(--text-primary, #1C1B1F); cursor: pointer; display: grid; place-items: center;">
          <span class="material-symbols-outlined" aria-hidden="true">dark_mode</span>
        </button>
      </div>
    </header>

    <div class="layout">
      <aside class="pet-column" aria-label="Pet Status">
        <section class="card card--filled pet-hero-stage">
          <div class="pet-scenery">
            <div id="combat-text-container" class="damage-layer"></div>

            <div id="axolotl-pet" class="pet-face-stage state-low" aria-label="Euno's energy expression">
              <img id="pet-face-current" class="pet-face-img" src="../images/Burnout.avif" width="320" height="320" alt="Burnout expression Euno" decoding="async" loading="eager" fetchpriority="high">
            </div>

            <span id="pet-status-badge" class="badge badge--danger pet-status-chip">Tired</span>
          </div>
        </section>

        <section class="card card--outlined metrics-panel" aria-label="System Metrics">
          <div class="progress-section">
            <div class="progress-labels">
              <span class="label-large">Energy Bar</span>
              <span id="progress-percentage" class="label-large color-primary">30%</span>
            </div>
            <div class="linear-progress" role="progressbar" aria-valuenow="30" aria-valuemin="0" aria-valuemax="100">
              <div id="progress-bar-fill" class="linear-progress__indicator color-state-danger"></div>
            </div>
          </div>

          <div class="stats-grid-row">
            <div class="stat-cell">
              <span class="label-small">Current Cycle</span>
              <span id="action-count" class="title-large">0</span>
            </div>
            <div class="stat-cell stat-cell--bordered">
              <span class="label-small">Best Run</span>
              <span id="highscore-summary-val" class="title-large">--</span>
            </div>
          </div>
        </section>
      </aside>

      <main class="choices-column" aria-label="Available Interventions">
        <h2 class="section-title-label">Available Choices</h2>
        <div id="activity-grid" class="choices-stack"></div>
      </main>
    </div>
  </div>

  <div id="modal-overlay" class="dialog-backdrop hidden" role="dialog" aria-modal="true" aria-labelledby="modal-title"
    tabindex="-1">
    <div class="dialog-surface">
      <div class="dialog-icon-wrapper">
        <span id="modal-icon" class="material-symbols-outlined">task_alt</span>
      </div>
      <h3 id="modal-title" class="dialog-title">Cycle Complete</h3>
      <p id="modal-description" class="dialog-supporting-text">The activity run evaluation sequence loop has terminated
        processing.</p>

      <div class="dialog-data-summary">
        <div class="summary-metric">
          <span class="label-medium">Total Actions</span>
          <span id="modal-stats-turns" class="body-large font-bold">0</span>
        </div>
        <div class="summary-metric">
          <span class="label-medium">Highscore Record</span>
          <span id="highscore-value" class="body-large font-bold">--</span>
        </div>
      </div>

      <div class="dialog-actions">
        <button id="restart-btn" class="button button--filled">
          <span class="material-symbols-outlined button__icon">refresh</span>
          <span class="button__label">Play Again</span>
        </button>
      </div>
    </div>
  </div>

  <script src="js/recharge-pet.js"></script>
  <script src="js/game-utils.js"></script>
</body>

</html>
